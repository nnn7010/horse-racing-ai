# 競馬予想AI設定ファイル

# 対象日
target_dates:
  - "2026-04-25"
  - "2026-04-26"

# 学習期間
train_period:
  start: "2023-04-18"
  end: "2026-04-24"

# 時系列分割
split:
  train_end: "2026-02-28"
  valid_start: "2026-03-01"
  valid_end: "2026-04-24"

# スクレイピング設定
scraping:
  interval: 0.5
  user_agent: "horse-racing-ai research bot"
  max_retries: 3
  cache_dir: "data/cache"
  timeout: 30

# 除外条件
exclude:
  - "新馬"
  - "障害"

# モデル設定
model:
  n_trials: 30
  seed: 42
  target: "top3"  # 3着以内

# 特徴量
features:
  recent_runs: 5
  stats_period_days: 365

# 馬券EV閾値
betting:
  thresholds:
    win: 1.10
    place: 1.10
    trifecta: 1.30
    trio: 1.50

# バックテスト
backtest:
  pattern_a:
    name: "均一100円"
    bet_amount: 100
  pattern_b:
    name: "1レース上限1000円"
    max_per_race: 1000
  pattern_c:
    name: "1レース予算3000円"
    race_budget: 3000

# パス
paths:
  cache: "data/cache"
  raw: "data/raw"
  processed: "data/processed"
  models: "models"
  outputs: "outputs"
