name: Update Odds

on:
  schedule:
    # 土日 09:00-17:00 JST (00:00-08:00 UTC) に5分ごと
    - cron: '*/5 0-8 * * 6,0'
  workflow_dispatch:  # 手動実行も可

permissions:
  contents: write

concurrency:
  group: update-odds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Update odds
        run: python3 scripts/update_odds.py

      - name: Commit & push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/today_predictions.json docs/index.html docs/odds.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-update odds at $(date '+%H:%M')"
            git push
          fi
